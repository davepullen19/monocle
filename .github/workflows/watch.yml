name: Thames Lido watch

on:
  schedule:
    # Availability check, ~every 5 min. Offset off the :00/:05 boundary so we're
    # not competing with the top-of-hour stampede (more ticks actually land).
    # GitHub schedules are best-effort and may still be delayed/coalesced.
    - cron: '2-59/5 * * * *'
    # Daily "still watching" heartbeat at 08:00 UTC.
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Send a test email to confirm the SMTP secrets work'
        type: boolean
        default: false

permissions:
  contents: write         # needed to commit state.json back to the repo

concurrency:
  group: thameslido-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    env:
      # Override these two by setting repo Variables (Settings → Secrets and
      # variables → Actions → Variables). Falls back to the defaults otherwise.
      WATCH_DATE: ${{ vars.WATCH_DATE || '2026-08-31' }}
      WATCH_PARTY: ${{ vars.WATCH_PARTY || '4,6' }}
    steps:
      - name: Send test email
        if: github.event_name == 'workflow_dispatch' && inputs.test_email == true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          from: Thames Lido Watcher <${{ secrets.SMTP_USER }}>
          to: ${{ secrets.SMTP_TO }}
          subject: "✅ Monocle watcher — test email"
          body: "If you're reading this, the GitHub Actions watcher can email you. The real alerts will look like this."

      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run watcher
        id: watch
        run: node watch.js

      - name: Daily heartbeat email
        if: github.event.schedule == '0 8 * * *'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          from: Thames Lido Watcher <${{ secrets.SMTP_USER }}>
          to: ${{ secrets.SMTP_TO }}
          subject: "🫀 Monocle still watching ${{ env.WATCH_DATE }} (party ${{ env.WATCH_PARTY }})"
          body: |
            The watcher is alive and running on schedule.
            Target: ${{ env.WATCH_DATE }}, party ${{ env.WATCH_PARTY }}.
            Latest check: available=${{ steps.watch.outputs.available }}.
            You'll still get a separate alert the moment this changes.

      - name: Email me on change
        if: steps.watch.outputs.changed == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          from: Thames Lido Watcher <${{ secrets.SMTP_USER }}>
          to: ${{ secrets.SMTP_TO }}
          subject: ${{ steps.watch.outputs.subject }}
          body: ${{ steps.watch.outputs.body }}

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "state: ${WATCH_DATE} party ${WATCH_PARTY} [skip ci]"
          git push
